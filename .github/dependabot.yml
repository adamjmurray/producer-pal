# See the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
    target-branch: "dev"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"
    versioning-strategy: "increase"
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      ai-libraries:
        patterns:
          - "ai"
          - "@ai-sdk/*"
          - "@openrouter/ai-sdk-provider"
      anthropic:
        patterns:
          - "@anthropic-ai/*"
          - "@modelcontextprotocol/*"
      rollup:
        patterns:
          - "rollup"
          - "@rollup/*"
          - "rollup-plugin-*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint-community/*"
          - "@typescript-eslint/*"
          - "@stylistic/eslint-plugin"
          - "@vitest/eslint-plugin"
      vite:
        patterns:
          - "vite"
          - "vite-plugin-*"
          - "vitepress"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/coverage-v8"
      preact:
        patterns:
          - "preact"
          - "@preact/*"
          - "@testing-library/preact"
      tailwind:
        patterns:
          - "@tailwindcss/*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
